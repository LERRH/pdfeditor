<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliminador de Marca de Agua PDF · PNSU/MVCS</title>
<style>
  :root {
    --azul: #1d4ed8;
    --azul-claro: #eff6ff;
    --azul-oscuro: #1e3a8a;
    --verde: #16a34a;
    --verde-bg: #f0fdf4;
    --rojo: #dc2626;
    --rojo-bg: #fef2f2;
    --amarillo: #b45309;
    --amarillo-bg: #fffbeb;
    --gris-texto: #475569;
    --gris-borde: #e2e8f0;
    --gris-fondo: #f8fafc;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #f1f5f9 0%, #e9eff8 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .icon-badge {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: var(--azul);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px -6px rgba(29, 78, 216, 0.5);
  }

  .icon-badge svg { width: 28px; height: 28px; stroke: #fff; }

  h1 {
    font-size: 24px;
    margin: 0 0 8px;
    color: #0f172a;
  }

  .subtitle {
    margin: 0;
    color: var(--gris-texto);
    font-size: 14.5px;
    line-height: 1.5;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 10px 40px -12px rgba(15, 23, 42, 0.12);
    border: 1px solid var(--gris-borde);
  }

  .dropzone {
    border: 2px dashed #cbd5e1;
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s ease;
    background: var(--gris-fondo);
  }

  .dropzone:hover {
    border-color: var(--azul);
    background: var(--azul-claro);
  }

  .dropzone.drag-active {
    border-color: var(--azul);
    background: var(--azul-claro);
    transform: scale(1.01);
  }

  .dropzone.hidden { display: none; }

  .dropzone-content svg {
    width: 40px;
    height: 40px;
    stroke: #94a3b8;
    margin-bottom: 12px;
  }

  .dz-title {
    margin: 0 0 4px;
    font-weight: 600;
    font-size: 15.5px;
    color: #1e293b;
  }

  .dz-subtitle {
    margin: 0;
    font-size: 13.5px;
    color: #94a3b8;
  }

  .file-info {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--gris-borde);
    border-radius: 14px;
    padding: 14px 16px;
    background: var(--gris-fondo);
  }

  .file-info.hidden { display: none; }

  .file-info svg { width: 30px; height: 30px; stroke: var(--azul); flex-shrink: 0; }

  .file-details { flex: 1; min-width: 0; }

  .file-name {
    margin: 0;
    font-weight: 600;
    font-size: 14px;
    color: #1e293b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    margin: 2px 0 0;
    font-size: 12.5px;
    color: #94a3b8;
  }

  .btn-icon {
    border: none;
    background: transparent;
    color: #94a3b8;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .btn-icon:hover { background: #e2e8f0; color: #475569; }

  .btn-primary {
    width: 100%;
    margin-top: 18px;
    padding: 13px 18px;
    border: none;
    border-radius: 12px;
    background: var(--azul);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  .btn-primary:hover:not(:disabled) { background: var(--azul-oscuro); }
  .btn-primary:active:not(:disabled) { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary.hidden { display: none; }

  .progress-area { margin-top: 18px; }
  .progress-area.hidden { display: none; }

  .progress-bar {
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: #e2e8f0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--azul);
    border-radius: 999px;
    transition: width 0.15s ease;
  }

  .progress-label {
    margin: 10px 0 0;
    font-size: 13px;
    color: var(--gris-texto);
    text-align: center;
  }

  .result-area { margin-top: 18px; }
  .result-area.hidden { display: none; }

  .alert {
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .alert svg { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }

  .alert-success { background: var(--verde-bg); color: #166534; border: 1px solid #bbf7d0; }
  .alert-success svg { stroke: var(--verde); }

  .alert-warning { background: var(--amarillo-bg); color: #92400e; border: 1px solid #fde68a; }
  .alert-warning svg { stroke: var(--amarillo); }

  .alert-error { background: var(--rojo-bg); color: #991b1b; border: 1px solid #fecaca; }
  .alert-error svg { stroke: var(--rojo); }

  footer {
    text-align: center;
    margin-top: 22px;
  }

  footer p {
    margin: 0;
    font-size: 12.5px;
    color: #94a3b8;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="icon-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path d="M14 2v6h6"></path>
          <line x1="9" y1="13" x2="15" y2="17"></line>
          <line x1="15" y1="13" x2="9" y2="17"></line>
        </svg>
      </div>
      <h1>Eliminador de Marca de Agua</h1>
      <p class="subtitle">Quita la firma digital diagonal de documentos PDF del PNSU / MVCS de forma rápida y segura.</p>
    </header>

    <div class="card">
      <div id="dropzone" class="dropzone">
        <input type="file" id="fileInput" accept="application/pdf,.pdf" hidden>
        <div class="dropzone-content" id="dropzoneContent">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p class="dz-title">Arrastra tu PDF aquí</p>
          <p class="dz-subtitle">o haz clic para seleccionar un archivo</p>
        </div>
      </div>

      <div id="fileInfo" class="file-info hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path d="M14 2v6h6"></path>
        </svg>
        <div class="file-details">
          <p id="fileName" class="file-name"></p>
          <p id="fileSize" class="file-size"></p>
        </div>
        <button id="removeFile" class="btn-icon" title="Quitar archivo">✕</button>
      </div>

      <button id="procesarBtn" class="btn-primary hidden">Eliminar marca de agua</button>

      <div id="progressArea" class="progress-area hidden">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <p id="progressLabel" class="progress-label">Leyendo archivo...</p>
      </div>

      <div id="resultArea" class="result-area hidden"></div>
    </div>

    <footer>
      <p>Todo el procesamiento ocurre en tu navegador. Tu PDF nunca se sube a ningún servidor.</p>
    </footer>
  </div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const removeFileBtn = document.getElementById('removeFile');
  const procesarBtn = document.getElementById('procesarBtn');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const resultArea = document.getElementById('resultArea');

  let archivoSeleccionado = null;

  const ICONOS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>',
    warning: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>'
  };

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }

  function ocultarResultado() {
    resultArea.classList.add('hidden');
    resultArea.innerHTML = '';
  }

  function ocultarProgreso() {
    progressArea.classList.add('hidden');
    progressFill.style.width = '0%';
  }

  function mostrarAlerta(tipo, mensaje) {
    resultArea.classList.remove('hidden');
    resultArea.innerHTML = `<div class="alert alert-${tipo}">${ICONOS[tipo]}<span>${mensaje}</span></div>`;
  }

  function seleccionarArchivo(file) {
    ocultarResultado();
    ocultarProgreso();
    if (!file) return;

    const esPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    if (!esPdf) {
      mostrarAlerta('error', 'Por favor selecciona un archivo PDF válido.');
      return;
    }

    archivoSeleccionado = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    dropzone.classList.add('hidden');
    fileInfo.classList.remove('hidden');
    procesarBtn.classList.remove('hidden');
    procesarBtn.disabled = false;
  }

  function limpiarSeleccion() {
    archivoSeleccionado = null;
    fileInput.value = '';
    fileInfo.classList.add('hidden');
    procesarBtn.classList.add('hidden');
    dropzone.classList.remove('hidden');
    ocultarResultado();
    ocultarProgreso();
  }

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => seleccionarArchivo(e.target.files[0]));

  ['dragenter', 'dragover'].forEach((evt) => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.add('drag-active');
    });
  });

  ['dragleave', 'drop'].forEach((evt) => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove('drag-active');
    });
  });

  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    seleccionarArchivo(file);
  });

  removeFileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    limpiarSeleccion();
  });

  function bytesALatin1(bytes) {
    let resultado = '';
    for (let i = 0; i < bytes.length; i++) {
      resultado += String.fromCharCode(bytes[i]);
    }
    return resultado;
  }

  function decodificarStream(rawStream) {
    const { PDFName, PDFArray } = PDFLib;
    const filtro = rawStream.dict.lookup(PDFName.of('Filter'));
    let bytes = rawStream.contents;
    if (!filtro) return bytes;

    const nombresFiltro = filtro instanceof PDFArray
      ? filtro.asArray().map((f) => f.toString())
      : [filtro.toString()];

    for (const nombre of nombresFiltro) {
      if (nombre === '/FlateDecode') {
        bytes = pako.inflate(bytes);
      } else {
        throw new Error('Filtro no soportado: ' + nombre);
      }
    }
    return bytes;
  }

  function obtenerRecursos(paginaNode) {
    if (typeof paginaNode.Resources === 'function') {
      const recursos = paginaNode.Resources();
      if (recursos) return recursos;
    }
    return paginaNode.lookup(PDFLib.PDFName.of('Resources'));
  }

  async function eliminarMarcaDeAgua(arrayBuffer, avanzarProgreso) {
    const { PDFDocument, PDFName, PDFNumber, PDFRawStream } = PDFLib;

    avanzarProgreso(20, 'Analizando estructura del PDF...');
    const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true, updateMetadata: false });

    let marcasEliminadas = 0;
    const paginas = pdfDoc.getPages();

    avanzarProgreso(45, 'Buscando marca de agua...');
    for (const pagina of paginas) {
      const resources = obtenerRecursos(pagina.node);
      if (!resources) continue;

      let xObjectDict;
      try {
        xObjectDict = resources.lookup(PDFName.of('XObject'));
      } catch (e) {
        continue;
      }
      if (!xObjectDict) continue;

      for (const clave of xObjectDict.keys()) {
        let xObject;
        try {
          xObject = xObjectDict.lookup(clave);
        } catch (e) {
          continue;
        }
        if (!(xObject instanceof PDFRawStream)) continue;

        const subtype = xObject.dict.lookup(PDFName.of('Subtype'));
        if (!subtype || subtype.toString() !== '/Form') continue;

        let datos;
        try {
          datos = decodificarStream(xObject);
        } catch (e) {
          continue;
        }

        const texto = bytesALatin1(datos);
        const cuentaTm = (texto.match(/Tm/g) || []).length;

        if (texto.includes('.707107') && cuentaTm > 5) {
          xObject.contents = new Uint8Array(0);
          xObject.dict.set(PDFName.of('Length'), PDFNumber.of(0));
          xObject.dict.delete(PDFName.of('Filter'));
          marcasEliminadas++;
        }
      }
    }

    avanzarProgreso(80, 'Generando PDF final...');
    const pdfBytes = await pdfDoc.save();

    return { pdfBytes, marcasEliminadas };
  }

  procesarBtn.addEventListener('click', async () => {
    if (!archivoSeleccionado) return;

    ocultarResultado();
    procesarBtn.disabled = true;
    progressArea.classList.remove('hidden');

    const setProgreso = (pct, etiqueta) => {
      progressFill.style.width = pct + '%';
      progressLabel.textContent = etiqueta;
    };

    setProgreso(5, 'Leyendo archivo...');

    try {
      const arrayBuffer = await archivoSeleccionado.arrayBuffer();
      const { pdfBytes, marcasEliminadas } = await eliminarMarcaDeAgua(arrayBuffer, setProgreso);

      setProgreso(100, 'Completado');

      const nombreBase = archivoSeleccionado.name.replace(/\.pdf$/i, '');
      const nombreSalida = `${nombreBase}_sin_marca.pdf`;

      if (marcasEliminadas === 0) {
        ocultarProgreso();
        mostrarAlerta('warning', 'No se detectó ninguna marca de agua conocida del PNSU/MVCS en este PDF. El archivo no fue modificado.');
        return;
      }

      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = nombreSalida;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      ocultarProgreso();
      mostrarAlerta('success', `Marca de agua eliminada correctamente. La descarga de <strong>${nombreSalida}</strong> debería comenzar automáticamente.`);
    } catch (err) {
      console.error(err);
      ocultarProgreso();
      mostrarAlerta('error', 'No se pudo procesar el PDF. Verifica que el archivo no esté dañado o protegido con contraseña.');
    } finally {
      procesarBtn.disabled = false;
    }
  });
</script>
</body>
</html>
